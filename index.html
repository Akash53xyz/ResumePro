<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Pro | Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo">Resume<span>Pro</span></div>
        
        <div class="menu-open-btn" id="open-btn">
            <i class="fas fa-bars"></i>
        </div>

        <nav class="nav-menu" id="side-menu">
            <div class="menu-close-btn" id="close-btn">
                <i class="fas fa-times"></i>
            </div>
            <ul class="nav-links">
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Templates</a></li>
                <li><a href="#">ATS Guide</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Support</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero">
        <h1>Build a resume that <br><span>actually</span> works.</h1>
        <p>Optimize your career path with our AI-driven ATS checker.</p>
        
        <div class="btn-container">
          <button class="main-btn create-btn" id="go-create">Create Resume</button>
            <button class="main-btn ats-btn" id="go-ats">Check ATS Score</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
